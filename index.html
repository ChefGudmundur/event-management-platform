<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Event Management Platform</title>
<style>
  :root{
    --ink:#221f1b;
    --ink-soft:#5c574e;
    --paper:#faf8f4;
    --surface:#ffffff;
    --line:#e6e1d6;
    --accent:#0f6e56;
    --accent-soft:#e1f5ee;
    --warn:#854f0b;
    --warn-soft:#faeeda;
    --danger:#a32d2d;
    --danger-soft:#fcebeb;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
  }
  .center-screen{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:32px;
    width:100%;
    max-width:380px;
  }
  .brand{
    font-size:13px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--accent);
    font-weight:600;
    margin:0 0 4px;
  }
  h1{
    font-size:22px;
    font-weight:600;
    margin:0 0 24px;
  }
  .tabs{
    display:flex;
    gap:4px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:8px;
    padding:3px;
    margin-bottom:20px;
  }
  .tab{
    flex:1;
    text-align:center;
    padding:7px 0;
    font-size:13px;
    font-weight:500;
    color:var(--ink-soft);
    border-radius:6px;
    cursor:pointer;
    user-select:none;
  }
  .tab.active{
    background:var(--surface);
    color:var(--ink);
    box-shadow:0 1px 2px rgba(0,0,0,0.06);
  }
  label{
    display:block;
    font-size:13px;
    font-weight:500;
    color:var(--ink-soft);
    margin:14px 0 6px;
  }
  input[type=email],input[type=password],input[type=text],select{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:8px;
    font-size:14px;
    background:var(--surface);
    color:var(--ink);
  }
  input:focus,select:focus{
    outline:2px solid var(--accent);
    outline-offset:1px;
  }
  button{
    font-family:inherit;
    cursor:pointer;
  }
  .btn-primary{
    width:100%;
    margin-top:20px;
    padding:11px 0;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:14px;
    font-weight:600;
  }
  .btn-primary:disabled{opacity:0.6;cursor:default;}
  .btn-secondary{
    padding:9px 16px;
    background:var(--surface);
    color:var(--ink);
    border:1px solid var(--line);
    border-radius:8px;
    font-size:13px;
    font-weight:500;
  }
  .error-msg{
    margin-top:14px;
    padding:10px 12px;
    background:var(--danger-soft);
    color:var(--danger);
    border-radius:8px;
    font-size:13px;
  }
  .hint{
    margin-top:18px;
    font-size:12px;
    color:var(--ink-soft);
    line-height:1.5;
  }
  code.uid{
    display:block;
    margin-top:8px;
    padding:10px 12px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:8px;
    font-size:12px;
    word-break:break-all;
  }
  header{
    border-bottom:1px solid var(--line);
    background:var(--surface);
    padding:16px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .tenant-name{font-size:15px;font-weight:600;}
  .role-tag{
    font-size:12px;
    color:var(--ink-soft);
  }
  nav{
    display:flex;
    gap:8px;
    align-items:center;
  }
  main{
    max-width:920px;
    margin:0 auto;
    padding:32px 28px;
  }
  .section-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:16px;
  }
  h2{font-size:18px;font-weight:600;margin:0;}
  table{
    width:100%;
    border-collapse:collapse;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
  }
  th,td{
    text-align:left;
    padding:11px 16px;
    font-size:13px;
    border-bottom:1px solid var(--line);
  }
  th{
    color:var(--ink-soft);
    font-weight:500;
    background:var(--paper);
  }
  tr:last-child td{border-bottom:none;}
  .badge{
    display:inline-block;
    padding:3px 10px;
    border-radius:100px;
    font-size:12px;
    font-weight:500;
    background:var(--accent-soft);
    color:var(--accent);
  }
  .empty-state{
    text-align:center;
    padding:48px 24px;
    color:var(--ink-soft);
    font-size:14px;
    background:var(--surface);
    border:1px dashed var(--line);
    border-radius:var(--radius);
  }
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(34,31,27,0.4);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .settings-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:24px;
    margin-bottom:20px;
  }
  .settings-card h3{
    font-size:15px;
    font-weight:600;
    margin:0 0 14px;
  }
  .list-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:9px 0;
    border-bottom:1px solid var(--line);
    font-size:14px;
  }
  .list-row:last-child{border-bottom:none;}
  .delete-link{
    background:none;
    border:none;
    color:var(--danger);
    font-size:12px;
    font-weight:500;
    padding:0;
  }
  .inline-form{
    display:flex;
    gap:8px;
    margin-top:14px;
  }
  .inline-form input{flex:1;}
  .inline-form button{flex-shrink:0;}
  .hidden{display:none !important;}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="center-screen">
  <div class="card">
    <p class="brand">Event management platform</p>
    <h1 id="auth-title">Sign in</h1>
    <div class="tabs">
      <div class="tab active" data-mode="signin">Sign in</div>
      <div class="tab" data-mode="signup">Sign up</div>
    </div>
    <form id="auth-form">
      <label for="email">Email</label>
      <input type="email" id="email" required autocomplete="email">
      <label for="password">Password</label>
      <input type="password" id="password" required autocomplete="current-password" minlength="6">
      <button type="submit" class="btn-primary" id="auth-submit">Sign in</button>
    </form>
    <div id="auth-error" class="error-msg hidden"></div>
  </div>
</div>

<!-- NO TENANT SCREEN -->
<div id="no-tenant-screen" class="center-screen hidden">
  <div class="card">
    <h1>Not linked to a workspace yet</h1>
    <p style="font-size:14px;color:var(--ink-soft);line-height:1.6;">
      Your account exists, but isn't connected to a tenant yet. Send this ID to whoever is setting up your workspace.
    </p>
    <code class="uid" id="no-tenant-uid"></code>
    <button class="btn-secondary" id="no-tenant-signout" style="margin-top:18px;">Sign out</button>
  </div>
</div>

<!-- APP SHELL -->
<div id="app-screen" class="hidden">
  <header>
    <div>
      <div class="tenant-name" id="tenant-name"></div>
      <div class="role-tag" id="role-name"></div>
    </div>
    <nav>
      <button class="btn-secondary" id="nav-events-btn">Events</button>
      <button class="btn-secondary hidden" id="nav-settings-btn">Settings</button>
      <button class="btn-secondary" id="signout-btn">Sign out</button>
    </nav>
  </header>
  <main>
    <div id="events-section">
      <div class="section-head">
        <h2>Events</h2>
        <button class="btn-secondary" id="new-event-btn">+ New event</button>
      </div>
      <div id="events-area"></div>
    </div>

    <div id="settings-section" class="hidden">
      <div class="section-head">
        <h2>Settings</h2>
      </div>

      <div class="settings-card">
        <h3>Event types</h3>
        <div id="event-types-list"></div>
        <form id="event-type-form" class="inline-form">
          <input type="text" id="new-event-type-name" placeholder="e.g. Wedding" required>
          <button type="submit" class="btn-secondary">Add</button>
        </form>
      </div>

      <div class="settings-card">
        <h3>Statuses</h3>
        <div id="statuses-list"></div>
        <form id="status-form" class="inline-form">
          <input type="text" id="new-status-name" placeholder="e.g. Confirmed" required>
          <button type="submit" class="btn-secondary">Add</button>
        </form>
      </div>
    </div>
  </main>
</div>

<!-- NEW EVENT MODAL -->
<div id="event-modal" class="modal-overlay hidden">
  <div class="card" style="max-width:420px;">
    <h1 style="font-size:18px;">New event</h1>
    <form id="event-form">
      <label for="ev-name">Event name</label>
      <input type="text" id="ev-name" required>
      <label for="ev-type">Event type</label>
      <select id="ev-type" required></select>
      <label for="ev-status">Status</label>
      <select id="ev-status" required></select>
      <div style="display:flex;gap:8px;margin-top:20px;">
        <button type="button" class="btn-secondary" id="event-cancel" style="flex:1;">Cancel</button>
        <button type="submit" class="btn-primary" style="margin-top:0;flex:1;">Create</button>
      </div>
    </form>
    <div id="event-error" class="error-msg hidden"></div>
  </div>
</div>
